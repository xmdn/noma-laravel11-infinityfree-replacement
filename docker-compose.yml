services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: noma-app
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      mailpit:
        condition: service_started
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - host_ip: "${NOMA_BIND_IP:-127.0.0.1}"
        published: "${NOMA_APP_PORT:-8083}"
        target: 8083
    networks:
      - noma-internal
    environment: &app-environment
      APP_NAME: ${APP_NAME}
      APP_ENV: ${APP_ENV}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG}
      APP_URL: ${APP_URL}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-*}
      CODESPACE_NAME: ${CODESPACE_NAME:-}
      GITHUB_CODESPACES_PORT_FORWARDING_DOMAIN: ${GITHUB_CODESPACES_PORT_FORWARDING_DOMAIN:-}
      NOMA_APP_PORT: ${NOMA_APP_PORT}
      NOMA_SHOP_URL_MODE: ${NOMA_SHOP_URL_MODE:-auto}
      DB_CONNECTION: ${DB_CONNECTION}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      LANDLORD_DB_HOST: ${LANDLORD_DB_HOST}
      LANDLORD_DB_PORT: ${LANDLORD_DB_PORT}
      LANDLORD_DB_DATABASE: ${LANDLORD_DB_DATABASE}
      LANDLORD_DB_USERNAME: ${LANDLORD_DB_USERNAME}
      LANDLORD_DB_PASSWORD: ${LANDLORD_DB_PASSWORD}
      TENANT_DB_HOST: ${TENANT_DB_HOST}
      TENANT_DB_PORT: ${TENANT_DB_PORT}
      TENANT_DB_USERNAME: ${TENANT_DB_USERNAME}
      TENANT_DB_PASSWORD: ${TENANT_DB_PASSWORD}
      SESSION_DRIVER: ${SESSION_DRIVER}
      CACHE_STORE: ${CACHE_STORE}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION}
      MAIL_MAILER: ${MAIL_MAILER}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE}
      RABBITMQ_WORKER: ${RABBITMQ_WORKER}
    command:
      - sh
      - -lc
      - |
        mkdir -p storage/framework
        rm -f /tmp/noma-docker-app-ready
        composer install --no-interaction --prefer-dist
        php artisan config:clear
        php artisan route:clear
        php artisan view:clear
        php artisan migrate --force
        php artisan migrate --database=landlord --path=database/migrations/landlord --force
        php artisan db:seed --force
        touch /tmp/noma-docker-app-ready
        php artisan serve --host=0.0.0.0 --port=8083

  assets:
    image: node:22-bookworm-slim
    container_name: noma-assets
    working_dir: /app
    volumes:
      - ./:/app
    networks:
      - noma-internal
    command: ["sh", "-lc", "npm ci && npm run build"]

  postgres:
    image: postgres:16-alpine
    container_name: noma-postgres
    ports:
      - host_ip: "${NOMA_BIND_IP:-127.0.0.1}"
        published: "${NOMA_POSTGRES_PORT:-5432}"
        target: 5432
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      LANDLORD_DB_DATABASE: ${LANDLORD_DB_DATABASE}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - noma-internal

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: noma-rabbitmq
    ports:
      - host_ip: "${NOMA_BIND_IP:-127.0.0.1}"
        published: "${NOMA_RABBITMQ_PORT:-5672}"
        target: 5672
      - host_ip: "${NOMA_BIND_IP:-127.0.0.1}"
        published: "${NOMA_RABBITMQ_MANAGEMENT_PORT:-15672}"
        target: 15672
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - noma-internal

  mailpit:
    image: axllent/mailpit:v1.20
    container_name: noma-mailpit
    ports:
      - host_ip: "${NOMA_BIND_IP:-127.0.0.1}"
        published: "${NOMA_MAILPIT_SMTP_PORT:-1025}"
        target: 1025
      - host_ip: "${NOMA_BIND_IP:-127.0.0.1}"
        published: "${NOMA_MAILPIT_UI_PORT:-8025}"
        target: 8025
    networks:
      - noma-internal

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: noma-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@emitapi.us.to}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-change-this-pgadmin-password}
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    ports:
      - host_ip: "${NOMA_BIND_IP:-127.0.0.1}"
        published: "${NOMA_PGADMIN_PORT:-5050}"
        target: 80
    networks:
      - noma-internal

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: noma-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
      rabbitmq:
        condition: service_started
      mailpit:
        condition: service_started
      pgadmin:
        condition: service_started
    environment:
      CERTIFICATE_NAME: ${EMIT_DOMAIN:-emitapi.us.to}
      EMIT_APP_HOST: ${EMIT_APP_HOST:-emitapi.us.to}
      EMIT_RABBITMQ_HOST: ${EMIT_RABBITMQ_HOST:-rabbitmq.emitapi.us.to}
      EMIT_MAILPIT_HOST: ${EMIT_MAILPIT_HOST:-mailpit.emitapi.us.to}
      EMIT_DB_HOST: ${EMIT_DB_HOST:-db.emitapi.us.to}
      NOMA_PROXY_BASIC_AUTH_USER: ${NOMA_PROXY_BASIC_AUTH_USER:-noma-admin}
      NOMA_PROXY_BASIC_AUTH_PASSWORD: ${NOMA_PROXY_BASIC_AUTH_PASSWORD:-change-this-admin-proxy-password}
    volumes:
      - ./docker/nginx/templates:/etc/nginx/noma-templates:ro
      - certbot-www:/var/www/certbot
      - certbot-etc:/etc/letsencrypt
    ports:
      - "${NOMA_HTTP_PORT:-80}:80"
      - "${NOMA_HTTPS_PORT:-443}:443"
    networks:
      - noma-internal

  certbot:
    image: certbot/certbot:latest
    container_name: noma-certbot
    restart: unless-stopped
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-etc:/etc/letsencrypt
    entrypoint: /bin/sh
    command: -c "while :; do certbot renew --webroot --webroot-path /var/www/certbot --quiet; sleep 12h; done"

  queue-worker:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: noma-queue-worker
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      mailpit:
        condition: service_started
      app:
        condition: service_started
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./:/app
    networks:
      - noma-internal
    environment:
      <<: *app-environment
    command:
      - sh
      - -lc
      - |
        until [ -f vendor/autoload.php ]; do
          echo "Waiting for Composer dependencies..."
          sleep 2
        done
        until [ -f /tmp/noma-docker-app-ready ]; do
          echo "Waiting for application migrations..."
          sleep 2
        done
        php artisan rabbitmq:queue-declare "$RABBITMQ_QUEUE" rabbitmq
        php artisan rabbitmq:consume rabbitmq --queue="$RABBITMQ_QUEUE"

volumes:
  postgres-data:
  rabbitmq-data:
  pgadmin-data:
  certbot-www:
  certbot-etc:
networks:
  noma-internal:
    driver: bridge
